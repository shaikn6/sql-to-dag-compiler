name: CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --cov=sql_to_dag --cov-report=term-missing --cov-fail-under=88

      - name: Verify generator runs on example SQL
        run: |
          python -m sql_to_dag.generator examples/sample_oracle.sql --output /tmp/test_output.py
          python -c "
          with open('/tmp/test_output.py') as f:
              source = f.read()
          compile(source, 'test_output.py', 'exec')
          print('Generated DAG is syntactically valid Python.')
          "

      - name: Verify dependency chain
        run: |
          python -c "
          from sql_to_dag.generator import compile_sql_file
          result = compile_sql_file('examples/sample_oracle.sql')
          assert 'create_customer_summary.set_upstream(create_customer_txn)' in result
          assert 'insert_high_value_customers.set_upstream(create_customer_summary)' in result
          print('Dependency chain verified.')
          "

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install security tools
        run: pip install bandit pip-audit
      - name: SAST — bandit
        run: bandit -r src/ -ll -ii --format json -o bandit-report.json; bandit -r src/ -ll -ii
        continue-on-error: true
      - name: Dependency audit
        run: pip-audit --desc -r requirements.txt
        continue-on-error: true
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report-${{ github.run_id }}
          path: bandit-report.json
          if-no-files-found: ignore
